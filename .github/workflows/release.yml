name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check-release:
    name: Check for new version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      needs_github_release: ${{ steps.check.outputs.needs_github_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Compare package.json version to npm and check GitHub release
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/portly/package.json').version")
          echo "Local version: $LOCAL_VERSION"

          NPM_VERSION=$(npm view @guthyerrz/portly version 2>/dev/null || echo "0.0.0")
          echo "npm version: $NPM_VERSION"

          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "Version changed: $NPM_VERSION -> $LOCAL_VERSION"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "needs_github_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged on npm, skipping publish"
            echo "should_release=false" >> "$GITHUB_OUTPUT"

            TAG="v$LOCAL_VERSION"
            if gh release view "$TAG" &>/dev/null; then
              echo "GitHub release $TAG exists"
              echo "needs_github_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "GitHub release $TAG is missing, will create it"
              echo "needs_github_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: check-release
    # npm publishing is opt-in: set the repo variable PUBLISH_NPM=true once npm
    # trusted publishing + the "Release" environment are configured. Until then
    # this job is skipped and only the GitHub Release (with tarball) is created.
    if: needs.check-release.outputs.should_release == 'true' && vars.PUBLISH_NPM == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance
        working-directory: packages/portly

  github-release:
    name: Create GitHub Release
    needs: [check-release, publish]
    if: >-
      always()
      && needs.check-release.outputs.needs_github_release == 'true'
      && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack tarball
        id: pack
        working-directory: packages/portly
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          cp ../../README.md .
          npm pack
          # npm flattens the scope: @guthyerrz/portly -> guthyerrz-portly-<ver>.tgz
          SRC=$(ls guthyerrz-portly-*.tgz | head -1)
          DEST="portly-$VERSION.tgz"
          mv "$SRC" "$DEST"
          echo "tarball=packages/portly/$DEST" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          awk '/<!-- release:start -->/{found=1; next} /<!-- release:end -->/{found=0} found{print}' CHANGELOG.md > /tmp/release-notes.md

          LINES=$(wc -l < /tmp/release-notes.md | tr -d ' ')
          if [ "$LINES" -lt 2 ]; then
            echo "No changelog entry found; will fall back to auto-generated notes."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi
        id: notes

      - name: Create or update GitHub Release
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="v$VERSION"
          TARBALL="${{ steps.pack.outputs.tarball }}"

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG exists; attaching tarball"
            gh release upload "$TAG" "$TARBALL" --clobber
          elif [ "${{ steps.notes.outputs.has_notes }}" = "true" ]; then
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md "$TARBALL"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes "$TARBALL"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
